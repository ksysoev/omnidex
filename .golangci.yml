version: "2"
run:
  issues-exit-code: 1
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - predeclared
    - staticcheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    govet:
      enable:
        - fieldalignment
    nolintlint:
      require-explanation: true
      require-specific: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2 
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goconst
        path: _test\.go$
      - linters:
          - gosec
        text: "G117:"  # field name matches secret pattern — config/CLI-flag structs, not leaks
      - linters:
          - gosec
        text: "G118:"  # cancel called in goroutine before blocking call returns
      - linters:
          - gosec
        text: "G122:"  # WalkDir path passed directly to ReadFile — not re-resolved
      - linters:
          - gosec
        text: "G703:"  # path traversal guarded by explicit "../" prefix check above
      - linters:
          - gosec
        text: "G704:"  # SSRF intentional — URL is operator-supplied in CLI tools
      - linters:
          - gosec
        text: "G706:"  # log values are filesystem paths from WalkDir/user config
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
