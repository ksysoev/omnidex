services:
  omnidex:
    build: .
    environment:
      API_LISTEN: "${API_LISTEN:-:8080}"
      API_API_KEYS: "${API_API_KEYS:-changeme}"
      STORAGE_PATH: "${STORAGE_PATH:-/data/docs}"
      SEARCH_INDEX_PATH: "${SEARCH_INDEX_PATH:-/data/search}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
      LOG_TEXT: "${LOG_TEXT:-true}"
    ports:
      - "${API_LISTEN_HOST:-8080}:8080"
    volumes:
      - omnidex-data:/data
    healthcheck:
      test: ["CMD", "omnidex", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  omnidex-seed:
    build: .
    depends_on:
      omnidex:
        condition: service_healthy
    volumes:
      - .:/repo:ro
    environment:
      OMNIDEX_API_KEY: "${API_API_KEYS:-changeme}"
    entrypoint:
      - omnidex
      - publish
      - --url
      - http://omnidex:8080
      - --docs-path
      - /repo
      - --file-pattern
      - "docs/sample/**/*.{md,yaml,yml,json}"
      - --repo
      - ksysoev/omnidex
      - --commit-sha
      - main
    restart: "no"

  # MinIO provides an S3-compatible object store for local development and
  # integration testing of the S3-backed document store.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  omnidex-data:
  minio-data:
