<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" font-family="sans-serif">
  <!-- Background -->
  <rect width="640" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Step 1: Publish -->
  <rect x="40" y="50" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="22">📤</text>
  <text x="110" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Publish</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#3b82f6">GitHub Action</text>
  <text x="110" y="133" text-anchor="middle" font-size="11" fill="#3b82f6">or Ingest API</text>

  <!-- Arrow 1→2 -->
  <line x1="182" y1="90" x2="248" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="248,85 258,90 248,95" fill="#94a3b8"/>

  <!-- Step 2: Search -->
  <rect x="260" y="50" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="82" text-anchor="middle" font-size="22">🔍</text>
  <text x="320" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Search</text>
  <text x="320" y="120" text-anchor="middle" font-size="11" fill="#22c55e">Full-text index</text>
  <text x="320" y="133" text-anchor="middle" font-size="11" fill="#22c55e">via Bleve</text>

  <!-- Arrow 2→3 -->
  <line x1="382" y1="90" x2="448" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="448,85 458,90 448,95" fill="#94a3b8"/>

  <!-- Step 3: Browse -->
  <rect x="460" y="50" width="140" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="530" y="82" text-anchor="middle" font-size="22">🌐</text>
  <text x="530" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Browse</text>
  <text x="530" y="120" text-anchor="middle" font-size="11" fill="#f59e0b">Web portal</text>
  <text x="530" y="133" text-anchor="middle" font-size="11" fill="#f59e0b">with HTMX</text>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">How Omnidex works</text>
</svg>
