# Development configuration only. Do not use in production.
# Override api_keys with secure values via environment variables or a separate config file.
api:
  listen: :8080
  api_keys:
    - changeme
  # Maximum ingest request body size in MiB. Increase if publishing repos with
  # many or large images. Override via API_MAX_INGEST_BODY_MIB env var.
  # max_ingest_body_mib: 50

storage:
  path: ./data/repos

search:
  index_path: ./data/search.bleve
