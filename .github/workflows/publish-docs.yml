name: Publish Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish docs to Omnidex
        uses: ksysoev/omnidex/action@main
        with:
          omnidex_url: ${{ vars.OMNIDEX_URL }}
          api_key: ${{ secrets.OMNIDEX_API_KEY }}
          docs_path: .
          file_pattern: "{README.md,docs/sample/**/*.{md,yaml,yml,json}}"
          sync: "true"
