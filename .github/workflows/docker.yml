name: Build Docker Image 

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_type == 'tag' && 'production' || '' }}
    concurrency:
      group: ${{ github.ref_type == 'tag' && 'production-omnidex' || format('omnidex-{0}', github.run_id) }}
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Set VERSION based on trigger type
        id: extract_version
        run: |
          if [[ $GITHUB_REF_TYPE == "tag" ]]; then
            # For tag triggers, use the tag name
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            # For branch/commit triggers, use the commit hash
            echo "VERSION=${GITHUB_SHA}" >> $GITHUB_ENV
            echo "version=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{  github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          build-args: |
            VERSION=${{ env.VERSION }}

  deploy:
    needs: [build-and-push]
    if: github.ref_type == 'tag'
    uses: ksysoev/cloudlab/.github/workflows/deploy-service.yml@main
    with:
      service_name: omnidex
      docker_compose_file: deploy/docker-compose.yml
      health_check_timeout: 60
      enable_rollback: true
      environment_name: production
      environment_vars: |
        {
          "OMNIDEX_VERSION": "${{ needs.build-and-push.outputs.version }}",
          "NETWORK_NAME": "omnidex-network",
          "MIT_CLIENT_VERSION": "${{ vars.MIT_CLIENT_VERSION }}"
        }
    secrets:
      ssh_key: ${{ secrets.SSH_KEY }}
      ssh_host: ${{ secrets.HOST }}
      ssh_user: ${{ secrets.USERNAME }}
      ssh_port: ${{ secrets.PORT }}
      deployment_secrets: |
        {
          "API_API_KEYS": "${{ secrets.API_API_KEYS }}",
          "MIT_TOKEN": "${{ secrets.MIT_TOKEN }}"
        }

